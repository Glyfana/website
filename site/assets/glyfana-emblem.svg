<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Glyfana emblem</title>
  <desc id="desc">A minimal Glyfana emblem with a soft diamond tile, a geometric G mark, and a restrained orange accent.</desc>
  <defs>
    <linearGradient id="tileFill" x1="64" y1="54" x2="194" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcf8f1" />
      <stop offset="1" stop-color="#e4efe8" />
    </linearGradient>
    <linearGradient id="tileStroke" x1="58" y1="62" x2="204" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b7b75" />
      <stop offset="1" stop-color="#ef8354" />
    </linearGradient>
    <linearGradient id="glyphStroke" x1="88" y1="88" x2="172" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d5550" />
      <stop offset="1" stop-color="#0b7b75" />
    </linearGradient>
    <linearGradient id="accentFill" x1="154" y1="84" x2="186" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ef8354" />
      <stop offset="1" stop-color="#f3b168" />
    </linearGradient>
    <filter id="shadow" x="28" y="28" width="200" height="200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#102027" flood-opacity="0.14" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect
      x="58"
      y="58"
      width="140"
      height="140"
      rx="38"
      transform="rotate(45 128 128)"
      fill="url(#tileFill)"
      stroke="url(#tileStroke)"
      stroke-width="6"
    />
    <path
      d="M159 94c-9-8-21-12-33-12c-26 0-46 20-46 46s20 46 46 46c18 0 34-10 42-25"
      fill="none"
      stroke="url(#glyphStroke)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="16"
    />
    <path
      d="M125 128h38"
      fill="none"
      stroke="url(#glyphStroke)"
      stroke-linecap="round"
      stroke-width="16"
    />
    <rect x="162" y="86" width="24" height="24" rx="10" fill="url(#accentFill)" />
  </g>
</svg>
