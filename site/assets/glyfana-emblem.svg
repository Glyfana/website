<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Glyfana emblem</title>
  <desc id="desc">A layered Glyfana emblem with a rounded diamond frame, a geometric G mark, and fan-like accent strokes.</desc>
  <defs>
    <linearGradient id="tileFill" x1="62" y1="46" x2="196" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcf9f3" stop-opacity="0.98" />
      <stop offset="1" stop-color="#e3efe8" stop-opacity="0.82" />
    </linearGradient>
    <linearGradient id="tileStroke" x1="56" y1="56" x2="208" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b7b75" />
      <stop offset="0.55" stop-color="#0d5550" />
      <stop offset="1" stop-color="#ef8354" />
    </linearGradient>
    <linearGradient id="glyphStroke" x1="80" y1="84" x2="176" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d5550" />
      <stop offset="1" stop-color="#0b7b75" />
    </linearGradient>
    <linearGradient id="fanStroke" x1="144" y1="72" x2="198" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ef8354" />
      <stop offset="1" stop-color="#f2b560" />
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientTransform="translate(68 72) rotate(90) scale(36)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b7b75" stop-opacity="0.25" />
      <stop offset="1" stop-color="#0b7b75" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientTransform="translate(194 190) rotate(90) scale(34)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ef8354" stop-opacity="0.22" />
      <stop offset="1" stop-color="#ef8354" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="20" y="20" width="216" height="216" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#102027" flood-opacity="0.16" />
    </filter>
  </defs>

  <circle cx="68" cy="72" r="36" fill="url(#glowLeft)" />
  <circle cx="194" cy="190" r="34" fill="url(#glowRight)" />

  <g filter="url(#shadow)">
    <rect
      x="56"
      y="56"
      width="144"
      height="144"
      rx="42"
      transform="rotate(45 128 128)"
      fill="url(#tileFill)"
      stroke="url(#tileStroke)"
      stroke-width="8"
    />
    <path
      d="M111 71c17-6 37-4 55 6"
      fill="none"
      stroke="#ffffff"
      stroke-linecap="round"
      stroke-width="7"
      opacity="0.48"
    />
    <path
      d="M160 92c-10-11-24-17-39-17c-30 0-54 24-54 53s24 53 54 53c20 0 39-11 48-29"
      fill="none"
      stroke="url(#glyphStroke)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="18"
    />
    <path
      d="M124 128h41"
      fill="none"
      stroke="url(#glyphStroke)"
      stroke-linecap="round"
      stroke-width="18"
    />
    <path
      d="M150 78c16 3 30 12 40 27"
      fill="none"
      stroke="url(#fanStroke)"
      stroke-linecap="round"
      stroke-width="11"
    />
    <path
      d="M162 84c12 4 22 11 30 22"
      fill="none"
      stroke="url(#fanStroke)"
      stroke-linecap="round"
      stroke-width="8"
      opacity="0.92"
    />
    <path
      d="M171 94c9 3 16 8 21 15"
      fill="none"
      stroke="url(#fanStroke)"
      stroke-linecap="round"
      stroke-width="6"
      opacity="0.9"
    />
    <circle cx="88" cy="164" r="7" fill="#ef8354" opacity="0.9" />
  </g>
</svg>
